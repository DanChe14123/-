<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>v0.8 首批卡通事件牌预览</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #eef2f7;
      color: #1f2937;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    p {
      margin: 0 0 20px;
      color: #4b5563;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }
    .card {
      background: #ffffff;
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.10);
    }
    .card img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 14px;
      background: #f8fafc;
    }
    .label {
      margin-top: 10px;
      font-size: 15px;
      font-weight: 600;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>v0.8 首批卡通事件牌预览</h1>
  <p>当前批次共 8 张，均为可编辑 SVG 正面卡。后续可以沿用同一生成器扩到全部事件牌。</p>
  <div class="grid">
    <div class="card"><img src="../events/fronts/E02_front.svg" alt="E02"><div class="label">E02 试剂瓶标签模糊</div></div>
    <div class="card"><img src="../events/fronts/E05_front.svg" alt="E05"><div class="label">E05 开放环境转移挥发性溶剂</div></div>
    <div class="card"><img src="../events/fronts/E08_front.svg" alt="E08"><div class="label">E08 玻璃器皿出现裂纹</div></div>
    <div class="card"><img src="../events/fronts/E09_front.svg" alt="E09"><div class="label">E09 气瓶未固定</div></div>
    <div class="card"><img src="../events/fronts/E13_front.svg" alt="E13"><div class="label">E13 皮肤接触腐蚀性液体</div></div>
    <div class="card"><img src="../events/fronts/E15_front.svg" alt="E15"><div class="label">E15 实验台出现小型明火</div></div>
    <div class="card"><img src="../events/fronts/E21_front.svg" alt="E21"><div class="label">E21 旋蒸装置夹具松动</div></div>
    <div class="card"><img src="../events/fronts/E23_front.svg" alt="E23"><div class="label">E23 未知粉末散落并引发不适</div></div>
  </div>
</body>
</html>
