    <rect x="70" y="620" width="208" height="38" rx="19" fill="#DDEBFF" stroke="none"/>
    <text x="174" y="646" text-anchor="middle" fill="#2D5FB3" font-size="22" font-weight="700" font-family="Microsoft YaHei, SimHei, sans-serif">观察重点</text>
    <text x="70" y="670" fill="#344054" font-size="28" font-weight="400" font-family="Microsoft YaHei, SimHei, sans-serif"><tspan x="70" dy="0">你拿起准备使用的试剂瓶，发现标签字迹</tspan><tspan x="70" dy="34">模糊，无法快速确认内容物和浓度。</tspan></text>

    <rect x="70" y="780" width="150" height="38" rx="19" fill="#4E83D9" opacity="0.18"/>
    <text x="145" y="806" text-anchor="middle" fill="#2D5FB3" font-size="22" font-weight="700" font-family="Microsoft YaHei, SimHei, sans-serif">错误倾向</text>
    <text x="70" y="880" fill="#28334A" font-size="28" font-weight="500" font-family="Microsoft YaHei, SimHei, sans-serif"><tspan x="70" dy="0">不要凭记忆和瓶身颜色直接判断。</tspan></text>
    <text x="520" y="806" fill="#2D5FB3" font-size="24" font-weight="700" font-family="Microsoft YaHei, SimHei, sans-serif"><tspan x="520" dy="0">无法被准确识别的试剂</tspan></text>
