    <text x="70" y="560" fill="#28334A" font-size="42" font-weight="700" font-family="Microsoft YaHei, SimHei, sans-serif"><tspan x="70" dy="0">未知粉末散落并引发不适</tspan></text>
    <rect x="70" y="620" width="208" height="38" rx="19" fill="#FFD7D6" stroke="none"/>
    <text x="174" y="646" text-anchor="middle" fill="#AD3530" font-size="22" font-weight="700" font-family="Microsoft YaHei, SimHei, sans-serif">观察重点</text>
    <text x="70" y="670" fill="#344054" font-size="28" font-weight="400" font-family="Microsoft YaHei, SimHei, sans-serif"><tspan x="70" dy="0">地面或台面散落未知粉末，附近人员已经</tspan><tspan x="70" dy="34">出现刺激性不适。</tspan></text>

    <rect x="70" y="780" width="150" height="38" rx="19" fill="#D85A57" opacity="0.18"/>
    <text x="145" y="806" text-anchor="middle" fill="#AD3530" font-size="22" font-weight="700" font-family="Microsoft YaHei, SimHei, sans-serif">错误倾向</text>
    <text x="70" y="880" fill="#28334A" font-size="28" font-weight="500" font-family="Microsoft YaHei, SimHei, sans-serif"><tspan x="70" dy="0">不要直接扫走，也不要徒手判断是什么。</tspan></text>
    <text x="520" y="806" fill="#AD3530" font-size="24" font-weight="700" font-family="Microsoft YaHei, SimHei, sans-serif"><tspan x="520" dy="0">未知物扩散，需要撤离警戒</tspan></text>
    <circle cx="640" cy="796" r="22" fill="#D85A57"/>
    <text x="640" y="804" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="800" font-family="Arial">!</text>
