    <text x="520" y="806" fill="#C8741E" font-size="24" font-weight="700" font-family="Microsoft YaHei, SimHei, sans-serif"><tspan x="520" dy="0">设备姿态异常，不适合继续运行</tspan></text>
    <circle cx="640" cy="796" r="22" fill="#F0A045"/>
    <text x="640" y="804" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="800" font-family="Arial">!</text>
    </svg>