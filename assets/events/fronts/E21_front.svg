    <g transform="translate(45,140)">
      <circle cx="130" cy="90" r="58" fill="#FFE2BF" opacity="0.6"/><circle cx="600" cy="110" r="72" fill="#FFE2BF" opacity="0.45"/><rect x="58" y="58" width="44" height="88" rx="16" fill="#FFFFFF" opacity="0.55"/><rect x="640" y="74" width="34" height="74" rx="12" fill="#FFFFFF" opacity="0.45"/><rect x="148" y="310" width="470" height="36" rx="16" fill="#7E5B48"/><rect x="188" y="172" width="110" height="112" rx="24" fill="#E2E8F2" stroke="#28334A" stroke-width="4"/><circle cx="242" cy="228" r="34" fill="#C8D4E6" stroke="#28334A" stroke-width="4"/><rect x="356" y="120" width="18" height="138" rx="9" fill="#8897B0"/><path d="M364 202 L452 178" stroke="#8897B0" stroke-width="10" stroke-linecap="round"/><path d="M452 178 L516 222" stroke="#8897B0" stroke-width="10" stroke-linecap="round"/><rect x="514" y="220" width="68" height="106" rx="22" transform="rotate(14 548 273)" fill="#D3EDFF" stroke="#28334A" stroke-width="4"/><path d="M418 160 L448 146" stroke="#D85A57" stroke-width="8" stroke-linecap="round"/><path d="M452 144 L480 164" stroke="#D85A57" stroke-width="8" stroke-linecap="round"/><circle cx="554" cy="148" r="28" fill="#FFF3D3" stroke="#28334A" stroke-width="4"/><text x="554" y="158" text-anchor="middle" fill="#C8741E" font-size="36" font-weight="800" font-family="Arial">!</text>
