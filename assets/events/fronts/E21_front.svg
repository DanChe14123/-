    <text x="70" y="560" fill="#28334A" font-size="42" font-weight="700" font-family="Microsoft YaHei, SimHei, sans-serif"><tspan x="70" dy="0">旋蒸装置夹具松动</tspan></text>
    <rect x="70" y="620" width="208" height="38" rx="19" fill="#FFE2BF" stroke="none"/>
    <text x="174" y="646" text-anchor="middle" fill="#C8741E" font-size="22" font-weight="700" font-family="Microsoft YaHei, SimHei, sans-serif">观察重点</text>
    <text x="70" y="670" fill="#344054" font-size="28" font-weight="400" font-family="Microsoft YaHei, SimHei, sans-serif"><tspan x="70" dy="0">旋蒸装置的夹具松动，或者收集瓶已经出</tspan><tspan x="70" dy="34">现明显偏斜。</tspan></text>

    <rect x="70" y="780" width="150" height="38" rx="19" fill="#F0A045" opacity="0.18"/>
