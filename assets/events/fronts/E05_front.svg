    <text x="70" y="560" fill="#28334A" font-size="42" font-weight="700" font-family="Microsoft YaHei, SimHei, sans-serif"><tspan x="70" dy="0">开放环境转移挥发性溶剂</tspan></text>
    <rect x="70" y="620" width="208" height="38" rx="19" fill="#FFE2BF" stroke="none"/>
    <text x="174" y="646" text-anchor="middle" fill="#C8741E" font-size="22" font-weight="700" font-family="Microsoft YaHei, SimHei, sans-serif">观察重点</text>
    <text x="70" y="670" fill="#344054" font-size="28" font-weight="400" font-family="Microsoft YaHei, SimHei, sans-serif"><tspan x="70" dy="0">操作者在普通实验台上转移挥发性溶剂，</tspan><tspan x="70" dy="34">周围没有有效局部排风。</tspan></text>

    <rect x="70" y="780" width="150" height="38" rx="19" fill="#F0A045" opacity="0.18"/>
    <text x="145" y="806" text-anchor="middle" fill="#C8741E" font-size="22" font-weight="700" font-family="Microsoft YaHei, SimHei, sans-serif">错误倾向</text>
    <text x="70" y="880" fill="#28334A" font-size="28" font-weight="500" font-family="Microsoft YaHei, SimHei, sans-serif"><tspan x="70" dy="0">不要认为“动作快一点”就能替代通风控</tspan><tspan x="70" dy="34">制。</tspan></text>
    <text x="520" y="806" fill="#C8741E" font-size="24" font-weight="700" font-family="Microsoft YaHei, SimHei, sans-serif"><tspan x="520" dy="0">操作地点错误，缺少局部排风</tspan></text>
    <circle cx="640" cy="796" r="22" fill="#F0A045"/>
    <text x="640" y="804" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="800" font-family="Arial">!</text>
